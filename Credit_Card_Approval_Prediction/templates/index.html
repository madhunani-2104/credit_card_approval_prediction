<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Credit Card Approval Prediction</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
  <h1>Credit Card Approval Prediction</h1>
  <form action="/predict" method="POST">
    <input type="number" step="any" name="gender" placeholder="Gender (0=F,1=M)" required>
    <input type="number" step="any" name="car" placeholder="Owns Car (0/1)" required>
    <input type="number" step="any" name="realty" placeholder="Owns Realty (0/1)" required>
    <input type="number" step="any" name="children" placeholder="Children count" required>
    <input type="number" step="any" name="income" placeholder="Annual Income" required>
    <input type="number" step="any" name="income_type" placeholder="Income Type (encoded)" required>
    <input type="number" step="any" name="education" placeholder="Education (encoded)" required>
    <input type="number" step="any" name="family_status" placeholder="Family Status (encoded)" required>
    <input type="number" step="any" name="housing" placeholder="Housing (encoded)" required>
    <input type="number" step="any" name="age" placeholder="Age (years)" required>
    <input type="number" step="any" name="employed" placeholder="Years Employed" required>
    <input type="number" step="any" name="mobile" placeholder="Has Mobile (0/1)" required>
    <input type="number" step="any" name="work_phone" placeholder="Work Phone (0/1)" required>
    <input type="number" step="any" name="phone" placeholder="Phone (0/1)" required>
    <input type="number" step="any" name="email" placeholder="Email (0/1)" required>
    <input type="number" step="any" name="family_members" placeholder="Family Members" required>
    <button type="submit">Predict</button>
  </form>
</div>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
